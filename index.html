<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAM Mall</title>

<style>
:root{
  --primary:#d6ef6d;
  --primary-dark:#b5e67d;
  --dark:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

/* Header */
header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  margin-bottom:20px;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.product{
  background:#111827;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
}

.product:hover{
  transform:translateY(-5px);
}

.product img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  background:var(--primary);
  border:none;
  padding:10px 15px;
  cursor:pointer;
  font-weight:bold;
  border-radius:10px;
}

/* Cart */
.cart{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  padding:10px 15px;
  border-radius:20px;
}

/* Mobile */
@media(max-width:768px){
  header{font-size:22px;}
  button{width:100%;}
}
</style>
</head>

<body>

<header>MAM Mall</header>

<div class="cart">
Cart: <span id="cart-count">0</span>
</div>

<section class="products">

<div class="product">
  <img src="a7285ea4-80c4-4308-acf5-e65e75707a2.png">
  <h3>Product 1</h3>
  <p>$10</p>
  <button onclick="addToCart(10)">Buy</button>
</div>

<div class="product">
  <img src="a7285ea4-80c4-4308-acf5-e65e75707a2.png">
  <h3>Product 1</h3>
  <p>$10</p>
  <button onclick="addToCart(10)">Buy</button>
</div>

</section>

<br><br>

<button onclick="order()">Place Order</button>

<script>
let cart = 0;
let total = 0;

function addToCart(price){
  cart++;
  total += price;
  document.getElementById("cart-count").innerText = cart;
}

function order(){
  alert("Order placed! Total: $" + total);
}
</script>

</body>
</html>
