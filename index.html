<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAM Mall</title>
<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div><i class="fa fa-bell"></i> ALERT</div>
  <div><i class="fa fa-gear"></i> SETTING</div>
</div>

<!-- BANNER -->
<div class="banner">
  <div class="banner-text">
    <h2>BANKING LOANS</h2>
    <p>Easy and fast loan process<br>No service fees</p>
    <button>Register Now</button>
  </div>
</div>

<!-- LOAN BOX -->
<div class="loan-box">
  <div class="range-labels">
    <span>80000₱</span>
    <span>5,000,000₱</span>
  </div>

  <input type="range" min="80000" max="5000000" value="80000" id="slider">

  <h1 id="amount">80000</h1>
</div>

<!-- MENU -->
<div class="menu">
  <div><i class="fa fa-home"></i><br>Home</div>
  <div><i class="fa fa-wallet"></i><br>Wallet</div>
  <div><i class="fa fa-phone"></i><br>Contact</div>
  <div><i class="fa fa-info-circle"></i><br>Info</div>
</div>

<script src="script.js"></script>
</body>
</html>
