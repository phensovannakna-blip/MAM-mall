<style>
:root{
  --primary:#0d6efd;
  --primary-dark:#0b5ed7;
  --dark:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

/* Header */
header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  margin-bottom:20px;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* Card */
.product{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.product:hover{
  transform:translateY(-8px);
}

/* Image */
.product img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

/* Button */
button{
  background:var(--primary);
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:var(--primary-dark);
}

/* Cart */
.cart{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  padding:10px 15px;
  border-radius:50px;
  display:flex;
  gap:8px;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#cart-count{
  background:var(--primary);
  padding:5px 10px;
  border-radius:50%;
}

/* Mobile */
@media (max-width:768px){
  header{
    font-size:22px;
  }
}
</style>
</head>
<body>

<header>MAM Mall</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<section class="products">

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <h3>Product 1</h3>
    <p>$10</p>
    <button onclick="addToCart('Product 1', 10)">Buy</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <h3>Product 2</h3>
    <p>$20</p>
    <button onclick="addToCart('Product 2', 20)">Buy</button>
  </div>

</section>

<button onclick="order()">Place Order</button>

<script>
let cart = 0;
let total = 0;

function addToCart(name, price){
  cart++;
  total += price;
  document.getElementById("cart-count").innerText = cart;
}

function order(){
  alert("Order placed!");
}
</script>

</body>
</html>
