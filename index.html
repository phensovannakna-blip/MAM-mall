<style>
:root{
  --primary:#0d6efd;
  --primary-dark:#0b5ed7;
  --dark:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

/* Header */
header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  margin-bottom:20px;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* Card */
.product{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.product:hover{
  transform:translateY(-8px);
}

/* Image */
.product img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

/* Button */
button{
  background:var(--primary);
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:var(--primary-dark);
}

/* Cart */
.cart{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  padding:10px 15px;
  border-radius:50px;
  display:flex;
  gap:8px;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#cart-count{
  background:var(--primary);
  padding:5px 10px;
  border-radius:50%;
}

/* Mobile */
@media (max-width:768px){
  header{
    font-size:22px;
  }
}
</style>
