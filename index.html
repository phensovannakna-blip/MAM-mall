<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAM Mall</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
header{background:linear-gradient(90deg,gold,#b8960b);padding:15px;text-align:center;font-size:28px;font-weight:bold;color:black}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.product{background:#222;padding:15px;border-radius:10px;text-align:center;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.product img{width:100%;border-radius:10px}
button{background:gold;border:none;padding:10px;cursor:pointer;font-weight:bold;border-radius:5px}
.cart{position:fixed;top:10px;right:10px;background:#000;padding:10px;border:1px solid gold}
@media</style> (max-width: 768px){
  .products{
    grid-template-columns:1fr;
  }

  button{
    width:100%;
    margin-top:10px;
  }

  header{
    font-size:22px;
  }
}
</head>
<body>

<header>MAM Mall</header>

<div class="cart">Cart: <span id="cart-count">0</span></div>

<section class="products">
<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Product 1</h3>
<p>$10</p>
<button onclick="addToCart('Product 1',10)">Buy</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Product 2</h3>
<p>$20</p>
<button onclick="addToCart('Product 2',20)">Buy</button>
</div>
</section>

<section style="text-align:center;padding:20px">
<button onclick="saveOrder()">Place Order</button>
</section>

<script>
let cart=[];
let orders = JSON.parse(localStorage.getItem('orders')) || [];

function addToCart(name,price){
 cart.push({name,price});
 document.getElementById('cart-count').innerText=cart.length;
}

function saveOrder(){
 if(cart.length===0){alert('Cart empty');return;}
 orders.push({items:cart,date:new Date().toLocaleString()});
 localStorage.setItem('orders',JSON.stringify(orders));
 cart=[];
 document.getElementById('cart-count').innerText=0;
 alert('Order saved');
}
</script>

</body>
</html>
